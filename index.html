<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktien Terminal Pro - V3.0 (Direkt-Modus)</title>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: #111827;
            --bg-card-hover: #1f2937;
            --bg-header: #151f32;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #38bdf8;
            --positive: #10b981;
            --negative: #ef4444;
            --border: #374151;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 25px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header-title-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .version-badge {
            background: #10b981;
            color: var(--bg-main);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        /* Filter-Leiste */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input, .select-input {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: var(--radius);
            outline: none;
            font-size: 0.9rem;
        }

        .search-input { flex: 1; min-width: 250px; }
        .select-input { min-width: 160px; cursor: pointer; }
        .search-input:focus, .select-input:focus { border-color: var(--accent); }

        /* Tabellen-Layout */
        .table-grid {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr 1fr 1.6fr 1.6fr;
            align-items: center;
            padding: 14px 20px;
        }

        .table-header {
            background-color: var(--bg-header);
            font-weight: 700;
            color: var(--text-muted);
            border-radius: var(--radius) var(--radius) 0 0;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sortable {
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        .sortable:hover {
            color: var(--accent);
        }

        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 6px;
        }

        .stock-row {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background-color 0.15s;
        }

        .stock-row:hover {
            background-color: var(--bg-card-hover);
            border-color: #4b5563;
        }

        .stock-summary {
            cursor: pointer;
        }

        /* Spalten-Ausrichtungen */
        .cell-left { text-align: left; display: flex; align-items: center; }
        .cell-center { text-align: center; justify-content: center; display: flex; }
        .cell-right { text-align: right; justify-content: flex-end; display: flex; font-weight: 600; }

        /* Logo & Firmenname */
        .stock-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stock-logo {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background-color: #ffffff;
            object-fit: contain;
            padding: 2px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .stock-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .stock-name { 
            font-weight: 700; 
            font-size: 0.95rem; 
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .stock-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .tag { background: #1f2937; color: #9ca3af; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; }

        /* Performance Badges */
        .perf-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            min-width: 75px;
            text-align: center;
        }
        .perf-badge.positive { color: var(--positive); background-color: rgba(16, 185, 129, 0.12); }
        .perf-badge.negative { color: var(--negative); background-color: rgba(239, 68, 68, 0.12); }

        /* KGV / KCV Werte */
        .val-main { font-size: 0.95rem; color: #ffffff; }
        .val-sub { font-size: 0.75rem; font-weight: 700; margin-left: 5px; }
        .val-sub.positive { color: var(--positive); }
        .val-sub.negative { color: var(--negative); }

        .discount-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .discount-badge {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            background: #065f46;
            color: #34d399;
            padding: 1px 5px;
            border-radius: 4px;
            margin-top: 3px;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        /* Aufklappbare Details */
        .stock-details {
            display: none;
            padding: 20px;
            background-color: #0b111e;
            border-top: 1px solid var(--border);
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .detail-card {
            background: rgba(17, 24, 39, 0.8);
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .detail-card label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .detail-card span { font-size: 1.1rem; font-weight: 700; color: #ffffff; }

        @media (max-width: 1024px) {
            .table-grid { grid-template-columns: 2fr 1.2fr 1fr 1fr 1fr; }
            .hide-tablet { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title-row">
            <h1>Aktien Terminal Pro</h1>
            <span class="version-badge">Version 3.0 (DIREKT-MODUS)</span>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 6px;">Klicke direkt auf die Spaltenüberschriften <b>KGV</b> oder <b>KCV</b>, um die Liste blitzschnell zu sortieren.</p>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" class="search-input" placeholder="Nach Name, Ticker oder Sektor suchen..." oninput="filterUndSortiere()">
        <select id="tagFilter" class="select-input" onchange="filterUndSortiere()">
            <option value="">Alle Branchen/Tags</option>
        </select>
        <select id="watchlistFilter" class="select-input" onchange="filterUndSortiere()">
            <option value="">Alle Listen (Gesamtansicht)</option>
            <option value="portfolio">Portfolio</option>
            <option value="watchlist">Watchlist</option>
        </select>
    </div>

    <div class="table-grid table-header">
        <span class="cell-left">Unternehmen / Ticker</span>
        <span class="cell-right">Kurs</span>
        <span class="cell-center">Heute</span>
        <span class="cell-center">1 Mon.</span>
        <span class="cell-center">1 Jahr</span>
        <span class="cell-center hide-tablet">Dividende</span>
        <span class="cell-right hide-tablet sortable" onclick="waehleSortierung('kgv')">KGV <span id="sort-icon-kgv">↕</span></span>
        <span class="cell-right hide-tablet sortable" onclick="waehleSortierung('kcv')">KCV <span id="sort-icon-kcv">↕</span></span>
    </div>

    <div id="stockList" class="stock-list"></div>
</div>

<script>
    // DEINE DATEN SIND JETZT DIREKT INTERN VERANKERT – KEIN BLOCKIEREN MEHR MÖGLICH!
    let alleAktien = [
        {
            "name": "Main Street Capital",
            "ticker": "MAIN",
            "logoUrl": "https://logo.clearbit.com/mainstcapital.com",
            "kurs": "49,53 $",
            "perfTag": 0.45,
            "perfMonat": 2.15,
            "perfJahr": 14.80,
            "perf5J": 38.40,
            "dividende": 0.0595,
            "kgv": 8.7,
            "kgv5J": 10.2,
            "kcv": 7.9,
            "kcv5J": 9.1,
            "monate": "Monatlich",
            "frequenz": "12x im Jahr",
            "exDate": "15.02.2025",
            "watchlist": true,
            "tags": ["Finanzen", "BDC", "Monatszahler"]
        },
        {
            "name": "Realty Income",
            "ticker": "O",
            "logoUrl": "https://logo.clearbit.com/realtyincome.com",
            "kurs": "54,20 $",
            "perfTag": -0.20,
            "perfMonat": -1.40,
            "perfJahr": 5.10,
            "perf5J": 12.30,
            "dividende": 0.0585,
            "kgv": 41.2,
            "kgv5J": 45.0,
            "kcv": 13.4,
            "kcv5J": 15.2,
            "monate": "Monatlich",
            "frequenz": "12x im Jahr",
            "exDate": "02.02.2025",
            "watchlist": true,
            "tags": ["Immobilien", "REIT", "Monatszahler"]
        },
        {
            "name": "Microsoft Corp.",
            "ticker": "MSFT",
            "logoUrl": "https://logo.clearbit.com/microsoft.com",
            "kurs": "415,60 $",
            "perfTag": 1.25,
            "perfMonat": 4.80,
            "perfJahr": 28.30,
            "perf5J": 115.40,
            "dividende": 0.0075,
            "kgv": 34.5,
            "kgv5J": 32.1,
            "kcv": 26.8,
            "kcv5J": 25.0,
            "monate": "Mär, Jun, Sep, Dez",
            "frequenz": "Quartalsweise",
            "exDate": "18.02.2025",
            "watchlist": false,
            "tags": ["Technologie", "Software", "KI"]
        },
        {
            "name": "Apple Inc.",
            "ticker": "AAPL",
            "logoUrl": "https://logo.clearbit.com/apple.com",
            "kurs": "182,30 $",
            "perfTag": -0.85,
            "perfMonat": 1.10,
            "perfJahr": 18.20,
            "perf5J": 94.60,
            "dividende": 0.0055,
            "kgv": 29.1,
            "kgv5J": 27.4,
            "kcv": 22.4,
            "kcv5J": 21.8,
            "monate": "Feb, Mai, Aug, Nov",
            "frequenz": "Quartalsweise",
            "exDate": "08.02.2025",
            "watchlist": false,
            "tags": ["Technologie", "Hardware", "Konsum"]
        }
    ];

    let aktuelleSortierung = { spalte: null, richtung: 'asc' };

    function parseToNumber(val) {
        if (val === undefined || val === null || val === "N/A" || val === "-" || val === "None") return null;
        if (typeof val === 'number') return val;
        let sauber = val.toString().replace(/[^0-9.,-]/g, '').replace(',', '.');
        let n = parseFloat(sauber);
        return isNaN(n) ? null : n;
    }

    function initialisiere() {
        extrahiereTags();
        filterUndSortiere();
    }

    function extrahiereTags() {
        try {
            const tagSet = new Set();
            alleAktien.forEach(a => { if (a.tags && Array.isArray(a.tags)) a.tags.forEach(t => { if(t) tagSet.add(String(t)); }); });
            const select = document.getElementById('tagFilter');
            if (select) {
                tagSet.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t; opt.textContent = t; select.appendChild(opt);
                });
            }
        } catch(e) { console.error("Fehler bei den Tags:", e); }
    }

    function waehleSortierung(spalte) {
        if (aktuelleSortierung.spalte === spalte) {
            aktuelleSortierung.richtung = aktuelleSortierung.richtung === 'asc' ? 'desc' : 'asc';
        } else {
            aktuelleSortierung.spalte = spalte;
            aktuelleSortierung.richtung = 'asc';
        }
        
        document.getElementById('sort-icon-kgv').textContent = '↕';
        document.getElementById('sort-icon-kcv').textContent = '↕';
        const aktuellesIcon = aktuelleSortierung.richtung === 'asc' ? '↑' : '↓';
        document.getElementById(`sort-icon-${spalte}`).textContent = aktuellesIcon;

        filterUndSortiere();
    }

    function filterUndSortiere() {
        const container = document.getElementById('stockList');
        try {
            const sTerm = document.getElementById('searchInput').value.toLowerCase();
            const selTag = document.getElementById('tagFilter').value;
            const selWatch = document.getElementById('watchlistFilter').value;

            let daten = alleAktien.filter(a => {
                const nameStr = String(a.name || '').toLowerCase();
                const tickerStr = String(a.ticker || '').toLowerCase();
                
                const matchesSearch = nameStr.includes(sTerm) || 
                                      tickerStr.includes(sTerm) || 
                                      (a.tags || []).some(t => String(t || '').toLowerCase().includes(sTerm));
                
                const matchesTag = !selTag || (a.tags || []).map(String).includes(selTag);
                
                let matchesWatch = true;
                if (selWatch === 'watchlist') matchesWatch = (a.watchlist === true || String(a.watchlist) === "true");
                if (selWatch === 'portfolio') matchesWatch = (a.watchlist === false || String(a.watchlist) === "false" || a.watchlist === undefined || a.watchlist === null);

                return matchesSearch && matchesTag && matchesWatch;
            });

            if (aktuelleSortierung.spalte) {
                daten.sort((a, b) => {
                    let valA = null, valB = null;
                    if (aktuelleSortierung.spalte === 'kgv') {
                        valA = parseToNumber(a.kgv) !== null ? parseToNumber(a.kgv) : parseToNumber(a.kgvAktuell);
                        valB = parseToNumber(b.kgv) !== null ? parseToNumber(b.kgv) : parseToNumber(b.kgvAktuell);
                    } else if (aktuelleSortierung.spalte === 'kcv') {
                        valA = parseToNumber(a.kcv) !== null ? parseToNumber(a.kcv) : parseToNumber(a.kcvAktuell);
                        valB = parseToNumber(b.kcv) !== null ? parseToNumber(b.kcv) : parseToNumber(b.kcvAktuell);
                    }
                    if (valA === null) return 1;
                    if (valB === null) return -1;
                    return aktuelleSortierung.richtung === 'asc' ? valA - valB : valB - valA;
                });
            }

            renderAktien(daten);
        } catch (err) {
            container.innerHTML = `<div style="padding: 20px; color: var(--negative);"><b>Fehler beim Filtern:</b> ${err.message}</div>`;
        }
    }

    function renderAktien(daten) {
        const container = document.getElementById('stockList');
        container.innerHTML = '';

        if (daten.length === 0) {
            container.innerHTML = '<p style="padding:30px; text-align:center; color:var(--text-muted); font-size:0.95rem;">Keine passenden Aktien gefunden.</p>';
            return;
        }

        daten.forEach(aktie => {
            try {
                const pTag = parseToNumber(aktie.perfTag) || 0;
                const pMonat = parseToNumber(aktie.perfMonat) || 0;
                const pJahr = parseToNumber(aktie.perfJahr) || 0;
                const p5J = parseToNumber(aktie.perf5J) || 0;

                const divRaw = parseToNumber(aktie.dividende);
                let dividendDisplay = "-";
                if (divRaw !== null) {
                    dividendDisplay = divRaw < 0.2 ? `${(divRaw * 100).toFixed(2)} %` : `${divRaw.toFixed(2)} %`;
                }

                const kgvNum = parseToNumber(aktie.kgv) !== null ? parseToNumber(aktie.kgv) : parseToNumber(aktie.kgvAktuell);
                const kgv5JNum = parseToNumber(aktie.kgv5J) !== null ? parseToNumber(aktie.kgv5J) : parseToNumber(aktie.kgv5Jahre);
                let kgvHTML = `<span class="val-main">-</span>`;
                if (kgvNum !== null) {
                    let diffHTML = ""; let discountHTML = "";
                    if (kgv5JNum !== null && kgv5JNum !== 0) {
                        const abw = ((kgvNum - kgv5JNum) / kgv5JNum) * 100;
                        diffHTML = `<span class="val-sub ${abw <= 0 ? 'positive' : 'negative'}">${abw > 0 ? '+' : ''}${abw.toFixed(0)}%</span>`;
                        if (abw < -10) discountHTML = `<span class="discount-badge">Rabatt 🏷️</span>`;
                    }
                    kgvHTML = `<div class="discount-container"><div><span class="val-main">${kgvNum.toFixed(1)}</span>${diffHTML}</div>${discountHTML}</div>`;
                }

                const kcvNum = parseToNumber(aktie.kcv) !== null ? parseToNumber(aktie.kcv) : parseToNumber(aktie.kcvAktuell);
                const kcv5JNum = parseToNumber(aktie.kcv5J) !== null ? parseToNumber(aktie.kcv5J) : parseToNumber(aktie.kcv5Jahre);
                let kcvHTML = `<span class="val-main">-</span>`;
                if (kcvNum !== null) {
                    let diffHTML = ""; let discountHTML = "";
                    if (kcv5JNum !== null && kcv5JNum !== 0) {
                        const abw = ((kcvNum - kcv5JNum) / kcv5JNum) * 100;
                        diffHTML = `<span class="val-sub ${abw <= 0 ? 'positive' : 'negative'}">${abw > 0 ? '+' : ''}${abw.toFixed(0)}%</span>`;
                        if (abw < 0 && !discountHTML) discountHTML = `<span class="discount-badge">Günstig 💸</span>`;
                    }
                    kcvHTML = `<div class="discount-container"><div><span class="val-main">${kcvNum.toFixed(1)}</span>${diffHTML}</div>${discountHTML}</div>`;
                }

                const tagsHTML = (aktie.tags || []).map(t => `<span class="tag">${String(t)}</span>`).join('');
                const fallbackLogo = `https://via.placeholder.com/32?text=${aktie.ticker || '?'}`;

                const row = document.createElement('div');
                row.className = 'stock-row';
                row.innerHTML = `
                    <div class="table-grid stock-summary" onclick="toggleDetails(this.parentNode)">
                        <div class="cell-left stock-profile">
                            <img class="stock-logo" src="${aktie.logoUrl || fallbackLogo}" onerror="this.src='${fallbackLogo}';">
                            <div class="stock-info">
                                <span class="stock-name">${aktie.name || 'Unbekannt'} <span style="color:var(--text-muted); font-size:0.75rem;">(${aktie.ticker || '-'})</span></span>
                                <div class="stock-tags">${tagsHTML}</div>
                            </div>
                        </div>
                        <div class="cell-right val-main">${aktie.kurs || '-'}</div>
                        <div class="cell-center"><span class="perf-badge ${pTag >= 0 ? 'positive' : 'negative'}">${pTag >= 0 ? '+' : ''}${pTag.toFixed(2)}%</span></div>
                        <div class="cell-center"><span class="perf-badge ${pMonat >= 0 ? 'positive' : 'negative'}">${pMonat >= 0 ? '+' : ''}${pMonat.toFixed(2)}%</span></div>
                        <div class="cell-center"><span class="perf-badge ${pJahr >= 0 ? 'positive' : 'negative'}">${pJahr >= 0 ? '+' : ''}${pJahr.toFixed(2)}%</span></div>
                        <div class="cell-center hide-tablet val-main" style="font-weight:600;">${dividendDisplay}</div>
                        <div class="cell-right hide-tablet">${kgvHTML}</div>
                        <div class="cell-right hide-tablet">${kcvHTML}</div>
                    </div>
                    
                    <div class="stock-details">
                        <div class="detail-card"><label>📆 Ausschüttung</label><span>${aktie.monate || '-'}</span></div>
                        <div class="detail-card"><label>🔄 Frequenz</label><span>${aktie.frequenz || '-'}</span></div>
                        <div class="detail-card"><label>KGV Aktuell</label><span>${kgvNum !== null ? kgvNum.toFixed(1) : '-'}</span></div>
                        <div class="detail-card"><label>KGV 5J Ø</label><span style="color:var(--text-muted);">${kgv5JNum !== null ? kgv5JNum.toFixed(1) : '-'}</span></div>
                        <div class="detail-card"><label>KCV Aktuell</label><span>${kcvNum !== null ? kcvNum.toFixed(1) : '-'}</span></div>
                        <div class="detail-card"><label>KCV 5J Ø</label><span style="color:var(--text-muted);">${kcv5JNum !== null ? kcv5JNum.toFixed(1) : '-'}</span></div>
                        <div class="detail-card"><label>Ex-Date</label><span>${aktie.exDate || '-'}</span></div>
                        <div class="detail-card"><label>5J Performance</label><span class="${p5J >= 0 ? 'positive' : 'negative'}" style="color:${p5J >= 0 ? 'var(--positive)' : 'var(--negative)'}">${p5J >= 0 ? '+' : ''}${p5J.toFixed(1)}%</span></div>
                    </div>
                `;
                container.appendChild(row);
            } catch(rowErr) {
                console.error("Fehler bei Zeile:", rowErr);
            }
        });
    }

    function toggleDetails(rowElement) {
        const details = rowElement.querySelector('.stock-details');
        const isVisible = window.getComputedStyle(details).display === 'grid';
        document.querySelectorAll('.stock-details').forEach(el => el.style.display = 'none');
        details.style.display = isVisible ? 'none' : 'grid';
    }

    // Sofortiger Start ohne Dateiverzögerung
    initialisiere();
</script>

</body>
</html>
