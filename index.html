<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Validator & Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; }
        .error-box { 
            background: rgba(239, 68, 68, 0.1); 
            border: 2px dashed #ef4444; 
            padding: 1.5rem; 
            border-radius: 8px; 
            margin-bottom: 2rem;
        }
        .error-title { color: #ef4444; font-weight: 700; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .error-details { font-family: monospace; background: #000; padding: 1rem; border-radius: 4px; color: #f43f5e; margin-top: 0.5rem; white-space: pre-wrap; }
        .success-box { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; padding: 1rem; border-radius: 8px; color: #10b981; font-weight: 600; margin-bottom: 1rem;}
        .info-text { color: #94a3b8; font-size: 0.9rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>Dashboard Diagnose-Modus</h1>
    <div id="diagnose-output">Prüfe Daten...</div>
</div>

<script>
    async function analysiereJSON() {
        const output = document.getElementById('diagnose-output');
        try {
            const cacheBuster = "?v=" + new Date().getTime();
            const antwort = await fetch('daten.json' + cacheBuster);
            
            if (!antwort.ok) {
                throw new Error(`Die Datei 'daten.json' wurde im Ordner nicht gefunden (HTTP ${antwort.status}).`);
            }
            
            const roherText = await antwort.text();
            
            try {
                const validierteDaten = JSON.parse(roherText);
                output.innerHTML = `
                    <div class="success-box">✓ Deine daten.json ist syntaktisch absolut fehlerfrei!</div>
                    <p class="info-text">Da die Datei in Ordnung ist, liegt das Problem woanders. Lade bitte die Seite einmal komplett neu (STRG + F5), damit das alte Dashboard wieder greift.</p>
                `;
            } catch (jsonFehler) {
                // Hier fangen wir den exakten Syntaxfehler ab
                output.innerHTML = `
                    <div class="error-box">
                        <div class="error-title">❌ Syntax-Fehler in deiner 'daten.json' gefunden!</div>
                        <p>JavaScript kann die Datei nicht lesen. Meistens fehlt ein Komma oder es ist eines zu viel am Ende eines Blocks.</p>
                        <div class="error-details">${jsonFehler.message}</div>
                        <p class="info-text" style="margin-top: 1rem; color: #f8fafc;"><strong>Was bedeutet das?</strong> Schau in deiner daten.json nach dem genannten Begriff oder der Stelle. Wenn du den Fehler nicht findest, kopiere mir einfach den Inhalt deiner 'daten.json' hier in den Chat, dann korrigiere ich sie dir sofort!</p>
                    </div>
                `;
            }
        } catch (netzwerkFehler) {
            output.innerHTML = `
                <div class="error-box">
                    <div class="error-title">❌ Datei-Ladefehler</div>
                    <div class="error-details">${netzwerkFehler.message}</div>
                </div>
            `;
        }
    }
    window.onload = analysiereJSON;
</script>
</body>
</html>
