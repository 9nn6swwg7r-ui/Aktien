<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktien Portfolio & Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 1rem; min-height: 100vh; }
        .container { max-width: 1450px; margin: 0 auto; }

        header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .refresh-btn { background-color: var(--accent); color: #000; padding: 0.6rem 1rem; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        /* DEBUG BOX */
        #debug-box {
            background-color: #facc15;
            color: #000;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-family: monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            border: 3px solid #ef4444;
        }

        .stock-item { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; padding: 1rem; }
        .stock-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .name { font-weight: bold; font-size: 1.2rem; }
        
        .raw-data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; font-family: monospace; font-size: 0.85rem; color: #cbd5e1; }
        .raw-data-grid div { background: #1e293b; padding: 0.5rem; border-radius: 4px; border: 1px solid #334155; }
        .label { color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; display: block; margin-bottom: 0.2rem; }
        .value { color: #fff; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Notfall-Debug-Ansicht</h1>
        <button class="refresh-btn" onclick="datenLaden()">🔄 ZWINGE RELOAD</button>
    </header>

    <div id="debug-box">
        <strong>Lade JSON-Daten...</strong>
    </div>

    <div id="stock-list"></div>
</div>

<script>
    async function datenLaden() {
        const debugBox = document.getElementById('debug-box');
        const container = document.getElementById('stock-list');
        debugBox.innerHTML = "<strong>Versuche Daten zu laden...</strong>";
        container.innerHTML = "";

        try {
            // Anti-Cache String
            const url = 'daten.json?timestamp=' + new Date().getTime();
            const antwort = await fetch(url);
            
            if (!antwort.ok) throw new Error("HTTP Fehler " + antwort.status);
            
            const aktien = await antwort.json();
            
            if (!Array.isArray(aktien) || aktien.length === 0) {
                debugBox.innerHTML = "<strong>Daten geladen, aber Array ist leer oder fehlerhaft.</strong>";
                return;
            }

            // Zeige die ersten 2 Aktien roh in der gelben Box
            debugBox.innerHTML = `<strong>ROH-DATEN AUS JSON (Erste Aktie):</strong><br><pre>${JSON.stringify(aktien[0], null, 2)}</pre>`;

            // Render alle Aktien völlig roh ohne jegliche Berechnungen
            aktien.forEach(aktie => {
                const item = document.createElement('div');
                item.className = 'stock-item';
                
                // Wir holen exakt die Keys aus deinem Screenshot
                const name = aktie.name || "Kein Name";
                const kgvAkt = aktie.kgvAktuell !== undefined ? aktie.kgvAktuell : "KEY FEHLT";
                const kcvAkt = aktie.kcvAktuell !== undefined ? aktie.kcvAktuell : "KEY FEHLT";
                const divYield = aktie.yield !== undefined ? aktie.yield : (aktie.dividendYield !== undefined ? aktie.dividendYield : "KEY FEHLT");

                item.innerHTML = `
                    <div class="stock-header">
                        <div class="name">${name}</div>
                    </div>
                    <div class="raw-data-grid">
                        <div><span class="label">Rohwert KGV (kgvAktuell)</span><span class="value">${kgvAkt}</span></div>
                        <div><span class="label">Rohwert KCV (kcvAktuell)</span><span class="value">${kcvAkt}</span></div>
                        <div><span class="label">Rohwert Dividende (yield / dividendYield)</span><span class="value">${divYield}</span></div>
                    </div>
                `;
                container.appendChild(item);
            });

        } catch (f) {
            debugBox.innerHTML = `<strong>FEHLER BEIM LADEN:</strong><br>${f.message}`;
        }
    }

    window.onload = datenLaden;
</script>
</body>
</html>
