<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktien Portfolio & Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
            --badge-discount: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            background-color: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            border: 1px solid var(--border);
        }

        .search-box input, .controls select {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus, .controls select:focus {
            border-color: var(--accent);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            background-color: var(--bg-primary);
            padding: 0.25rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 0.6rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--bg-secondary);
            color: var(--accent);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .stock-table-header {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr 1fr;
            padding: 1rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .stock-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stock-item:hover {
            border-color: #475569;
        }

        .stock-summary {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr 1fr;
            padding: 1.25rem 1.5rem;
            align-items: center;
            cursor: pointer;
        }

        .stock-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stock-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background-color: #fff;
            object-fit: contain;
            padding: 2px;
            border: 1px solid var(--border);
        }

        .stock-info .name {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .tags-container {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.35rem;
            flex-wrap: wrap;
        }

        .tag {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .stock-value {
            font-weight: 500;
            font-size: 1rem;
        }

        .perf.positive { color: var(--success); }
        .perf.negative { color: var(--danger); }

        .discount-badge {
            background-color: rgba(34, 197, 94, 0.15);
            color: var(--badge-discount);
            font-size: 0.75rem;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-weight: 700;
            margin-left: 0.5rem;
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: inline-block;
            vertical-align: middle;
        }

        .stock-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(4, 0, 0.2, 1);
            background-color: rgba(30, 41, 59, 0.3);
            border-top: 0 solid var(--border);
        }

        .stock-item.open .stock-details {
            max-height: 400px;
            border-top: 1px solid var(--border);
        }

        .details-grid {
            padding: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .detail-card {
            background-color: rgba(15, 23, 42, 0.6);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .detail-card label {
            display: block;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            letter-spacing: 0.02em;
        }

        .detail-card span {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .detail-card.highlight {
            border-left: 3px solid var(--accent);
        }

        @media (max-width: 1024px) {
            .stock-table-header, .stock-summary {
                grid-template-columns: 2fr 1fr 1fr 1fr;
            }
            .hide-tablet { display: none; }
        }

        @media (max-width: 640px) {
            .stock-table-header, .stock-summary {
                grid-template-columns: 1fr 1fr;
            }
            .hide-mobile { display: none; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Umfassendes Aktien-Dashboard</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('portfolio')">Depot Portfolio</button>
            <button class="tab-btn" onclick="switchTab('watchlist')">Watchlist</button>
        </div>
    </header>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="search" placeholder="Aktie oder Tag suchen..." oninput="filterAktien()">
        </div>
        <div>
            <select id="sortPerformance" onchange="filterAktien()">
                <option value="default">Sortierung: Standard</option>
                <option value="perfMonat">Beste Monats-Performance</option>
                <option value="perfJahr">Beste Jahres-Performance</option>
                <option value="yield">Höchste Dividendenrendite</option>
                <option value="kgvAsc">Niedrigstes KGV (Value-Fokus)</option>
                <option value="kgvDesc">Höchstes KGV (Wachstum)</option>
            </select>
        </div>
    </div>

    <div class="stock-table-header">
        <span>Unternehmen / Sektor</span>
        <span>Kurs (EUR)</span>
        <span>1 Monat</span>
        <span class="hide-mobile">1 Jahr</span>
        <span class="hide-tablet">Dividende</span>
        <span class="hide-tablet">KGV</span>
    </div>

    <div id="stock-list" class="stock-list"></div>
</div>

<script>
    let alleAktien = [];
    let aktuellerTab = 'portfolio';

    async function datenLaden() {
        try {
            const antwort = await fetch('daten.json');
            alleAktien = await antwort.json();
            renderAktien();
        } catch (fehler) {
            console.error("Fehler beim Abrufen der JSON-Daten:", fehler);
            document.getElementById('stock-list').innerHTML = `<p style="padding: 2rem; color: var(--danger);">Fehler beim Laden der Portfolio-Daten.</p>`;
        }
    }

    function switchTab(tab) {
        aktuellerTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderAktien();
    }

    function renderAktien(gefilterteListe = null) {
        const liste = gefilterteListe || alleAktien;
        const container = document.getElementById('stock-list');
        container.innerHTML = '';

        const tabListe = liste.filter(aktie => {
            if (aktuellerTab === 'portfolio') return !aktie.watchlist;
            if (aktuellerTab === 'watchlist') return aktie.watchlist;
            return true;
        });

        if (tabListe.length === 0) {
            container.innerHTML = `<p style="padding: 2rem; color: var(--text-muted); text-align: center;">Keine passenden Werte gefunden.</p>`;
            return;
        }

        tabListe.forEach(aktie => {
            const tagsHTML = aktie.tags.map(t => `<span class="tag">${t}</span>`).join('');
            const monatClass = aktie.perfMonat >= 0 ? 'positive' : 'negative';
            const jahrClass = aktie.perfJahr >= 0 ? 'positive' : 'negative';
            
            let dividendDisplay = "-";
            if (aktie.yield > 0) {
                dividendDisplay = aktie.yield === 0.01 ? "Ja" : `${aktie.yield.toFixed(2)} %`;
            }

            const hatKGV = aktie.kgv && aktie.kgv > 0;
            const hatKGV5J = aktie.kgv5J && aktie.kgv5J > 0;
            
            let discountBadgeHTML = "";
            if (hatKGV && hatKGV5J && aktie.kgv < aktie.kgv5J) {
                discountBadgeHTML = `<span class="discount-badge">Günstig 🔥</span>`;
            }

            const kgvDisplay = hatKGV ? aktie.kgv.toFixed(1) : '-';
            const kgv5JDisplay = hatKGV5J ? aktie.kgv5J.toFixed(1) : '-';

            const item = document.createElement('div');
            item.className = 'stock-item';
            item.innerHTML = `
                <div class="stock-summary" onclick="toggleDetails(this.parentNode)">
                    <div class="stock-profile">
                        <img src="${aktie.logoUrl}" class="stock-logo" onerror="this.src='https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=100&auto=format&fit=crop&q=60'">
                        <div class="stock-info">
                            <div class="name">${aktie.name}</div>
                            <div class="tags-container">${tagsHTML}</div>
                        </div>
                    </div>
                    <div class="stock-value">${aktie.kurs}</div>
                    <div class="stock-value perf ${monatClass}">${aktie.perfMonat >= 0 ? '+' : ''}${aktie.perfMonat.toFixed(2)}%</div>
                    <div class="stock-value perf ${jahrClass} hide-mobile">${aktie.perfJahr >= 0 ? '+' : ''}${aktie.perfJahr.toFixed(2)}%</div>
                    <div class="stock-value hide-tablet">${dividendDisplay}</div>
                    <div class="stock-value hide-tablet" style="white-space: nowrap;">${kgvDisplay} ${discountBadgeHTML}</div>
                </div>
                <div class="stock-details">
                    <div class="details-grid">
                        <div class="detail-card highlight">
                            <label>Dividenden-Monate</label>
                            <span>${aktie.monate || '-'}</span>
                        </div>
                        <div class="detail-card">
                            <label>Intervall</label>
                            <span>${aktie.frequenz || '-'}</span>
                        </div>
                        <div class="detail-card">
                            <label>Ex-Datum</label>
                            <span>${aktie.exDate || '-'}</span>
                        </div>
                        <div class="detail-card">
                            <label>5Y Ø KGV</label>
                            <span style="color: var(--accent);">${kgv5JDisplay}</span>
                        </div>
                        <div class="detail-card">
                            <label>5J Perf.</label>
                            <span class="perf ${aktie.perf5J >= 0 ? 'positive' : 'negative'}">
                                ${aktie.perf5J >= 0 ? '+' : ''}${aktie.perf5J.toFixed(1)}%
                            </span>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function toggleDetails(element) {
        const isOpen = element.classList.contains('open');
        document.querySelectorAll('.stock-item').forEach(i => i.classList.remove('open'));
        if (!isOpen) element.classList.add('open');
    }

    function filterAktien() {
        const suchBegriff = document.getElementById('search').value.toLowerCase();
        const sortWert = document.getElementById('sortPerformance').value;

        let ergebnis = alleAktien.filter(aktie => {
            return aktie.name.toLowerCase().includes(suchBegriff) || aktie.tags.some(t => t.toLowerCase().includes(suchBegriff));
        });

        if (sortWert === 'perfMonat') {
            ergebnis.sort((a, b) => b.perfMonat - a.perfMonat);
        } else if (sortWert === 'perfJahr') {
            ergebnis.sort((a, b) => b.perfJahr - a.perfJahr);
        } else if (sortWert === 'yield') {
            ergebnis.sort((a, b) => b.yield - a.yield);
        } else if (sortWert === 'kgvAsc') {
            // Sortiert nach niedrigstem KGV, schiebt 0 oder ungültige KGVs nach hinten
            ergebnis.sort((a, b) => {
                const valA = a.kgv && a.kgv > 0 ? a.kgv : Infinity;
                const valB = b.kgv && b.kgv > 0 ? b.kgv : Infinity;
                return valA - valB;
            });
        } else if (sortWert === 'kgvDesc') {
            // Sortiert nach höchstem KGV, schiebt 0 nach ganz hinten
            ergebnis.sort((a, b) => {
                const valA = a.kgv && a.kgv > 0 ? a.kgv : -Infinity;
                const valB = b.kgv && b.kgv > 0 ? b.kgv : -Infinity;
                return valB - valA;
            });
        }

        renderAktien(ergebnis);
    }

    window.onload = datenLaden;
</script>
</body>
</html>
