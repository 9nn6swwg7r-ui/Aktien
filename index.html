<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktien Portfolio & Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
            --badge-discount: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            background-color: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            border: 1px solid var(--border);
        }

        .search-box input, .controls select {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus, .controls select:focus {
            border-color: var(--accent);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            background-color: var(--bg-primary);
            padding: 0.25rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 0.6rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--bg-secondary);
            color: var(--accent);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* --- DESKTOP TABLE STYLES --- */
        .stock-table-header, .stock-summary {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr 1.5fr 1.5fr;
            padding: 1rem 1.5rem;
            align-items: center;
            gap: 1rem;
        }

        .stock-table-header {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .stock-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stock-item:hover {
            border-color: #475569;
        }

        .stock-summary {
            padding: 1.25rem 1.5rem;
            cursor: pointer;
        }

        .stock-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            min-width: 0;
        }

        .stock-logo {
            width: 40px;
            height: 40px;
            min-width: 40px !important;
            min-height: 40px !important;
            max-width: 40px;
            max-height: 40px;
            border-radius: 8px;
            background-color: #ffffff;
            object-fit: contain;
            padding: 4px;
            border: 1px solid var(--border);
            flex-shrink: 0 !important;
        }

        .stock-info {
            min-width: 0;
        }

        .stock-info .name {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tags-container {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.35rem;
            flex-wrap: wrap;
        }

        .tag {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .stock-value {
            font-weight: 500;
            font-size: 1rem;
        }

        .perf.positive { color: var(--success); }
        .perf.negative { color: var(--danger); }

        .discount-badge {
            background-color: rgba(34, 197, 94, 0.15);
            color: var(--badge-discount);
            font-size: 0.75rem;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-weight: 700;
            margin-left: 0.5rem;
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: inline-block;
            vertical-align: middle;
        }

        .kgv-diff-text {
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 0.4rem;
        }

        .stock-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(4, 0, 0.2, 1);
            background-color: rgba(30, 41, 59, 0.3);
            border-top: 0 solid var(--border);
        }

        .stock-item.open .stock-details {
            max-height: 800px;
            border-top: 1px solid var(--border);
        }

        .details-container {
            padding: 1.5rem;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        .detail-card {
            background-color: rgba(15, 23, 42, 0.6);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .detail-card label {
            display: block;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            letter-spacing: 0.02em;
        }

        .detail-card span {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .detail-card.highlight {
            border-left: 3px solid var(--accent);
        }

        .perf-explanation {
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px dashed rgba(51, 65, 85, 0.6);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .info-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .info-text strong {
            color: var(--text-main);
        }

        /* --- MOBILGERÄTE CONTAINER --- */
        .mobile-row-layout { display: none; }

        /* --- RESPONSIVE BREAKPOINTS --- */
        @media (max-width: 1100px) {
            .stock-table-header, .stock-summary {
                grid-template-columns: 2.5fr 1.2fr 1.2fr 1.2fr;
            }
            .hide-tablet { display: none; }
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .stock-table-header { display: none; }
            .stock-summary { display: none !important; }

            .mobile-row-layout {
                display: flex !important;
                align-items: center;
                justify-content: space-between;
                padding: 1.25rem 1rem;
                cursor: pointer;
                width: 100%;
            }

            .mobile-left {
                display: flex;
                align-items: center;
                gap: 1rem;
                min-width: 0;
                flex: 1;
            }

            .mobile-right {
                text-align: right;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
            }

            .mobile-right .mob-kurs {
                font-weight: 700;
                font-size: 1.1rem;
                color: var(--text-main);
            }

            .mobile-right .mob-perf {
                font-size: 0.85rem;
                font-weight: 600;
            }

            .details-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
            
            .perf-explanation {
                flex-direction: column;
                gap: 0.6rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Umfassendes Aktien-Dashboard</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('portfolio')">Depot Portfolio</button>
            <button class="tab-btn" onclick="switchTab('watchlist')">Watchlist</button>
        </div>
    </header>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="search" placeholder="Aktie oder Tag suchen..." oninput="filterAktien()">
        </div>
        <div>
            <select id="sortPerformance" onchange="filterAktien()">
                <option value="default">Sortierung: Standard</option>
                <option value="perfMonat">Beste Monats-Performance</option>
                <option value="perfJahr">Beste Jahres-Performance</option>
                <option value="yield">Höchste Dividendenrendite</option>
                <option value="kgvAsc">Niedrigstes KGV (Value-Fokus)</option>
                <option value="kgvDesc">Höchstes KGV (Wachstum)</option>
                <option value="kgvDiffAsc">Höchste KGV-Unterbewertung (Abweichung)</option>
            </select>
        </div>
    </div>

    <div class="stock-table-header">
        <span>Unternehmen / Sektor</span>
        <span>Kurs (EUR)</span>
        <span>1 Monat</span>
        <span>1 Jahr</span>
        <span class="hide-tablet">Dividende</span>
        <span class="hide-tablet">KGV (% vs. 5J Ø)</span>
        <span class="hide-tablet">KCV (5J Ø)</span>
    </div>

    <div id="stock-list" class="stock-list"></div>
</div>

<script>
    let alleAktien = [];
    let aktuellerTab = 'portfolio';

    // Fehlersichere Berechnung
    function berechneKgvAbweichung(aktie) {
        if (aktie && aktie.kgv && aktie.kgv > 0 && aktie.kgv5J && aktie.kgv5J > 0) {
            return ((aktie.kgv - aktie.kgv5J) / aktie.kgv5J) * 100;
        }
        return null;
    }

    async function datenLaden() {
        try {
            const antwort = await fetch('daten.json');
            if (!antwort.ok) throw new Error("HTTP Fehler " + antwort.status);
            alleAktien = await antwort.json();
            renderAktien();
        } catch (fehler) {
            console.error("Fehler beim Abrufen der JSON-Daten:", fehler);
            document.getElementById('stock-list').innerHTML = `
                <div style="padding: 2rem; background: rgba(239,68,68,0.1); border: 1px solid var(--danger); border-radius: 8px; text-align: center;">
                    <p style="color: var(--danger); font-weight: 600; margin-bottom: 0.5rem;">Fehler beim Laden der Portfolio-Daten.</p>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Bitte überprüfe, ob die Datei 'daten.json' im selben Ordner liegt und ein gültiges JSON-Format hat.</p>
                </div>`;
        }
    }

    function switchTab(tab) {
        aktuellerTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(event && event.target) event.target.classList.add('active');
        renderAktien();
    }

    function renderAktien(gefilterteListe = null) {
        const liste = gefilterteListe || alleAktien;
        const container = document.getElementById('stock-list');
        container.innerHTML = '';

        // Sicherheitscheck, falls JSON leer oder fehlerhaft geladen wurde
        if (!Array.isArray(liste)) return;

        const tabListe = liste.filter(aktie => {
            if (aktuellerTab === 'portfolio') return !aktie.watchlist;
            if (aktuellerTab === 'watchlist') return aktie.watchlist;
            return true;
        });

        if (tabListe.length === 0) {
            container.innerHTML = `<p style="padding: 2rem; color: var(--text-muted); text-align: center;">Keine passenden Werte gefunden.</p>`;
            return;
        }

        tabListe.forEach(aktie => {
            // Ausfallsichere Variablenzuweisungen (Verhindert Absturz bei fehlenden Feldern)
            const tags = Array.isArray(aktie.tags) ? aktie.tags : [];
            const tagsHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');
            
            const perfMonat = typeof aktie.perfMonat === 'number' ? aktie.perfMonat : 0;
            const perfJahr = typeof aktie.perfJahr === 'number' ? aktie.perfJahr : 0;
            const perf5J = typeof aktie.perf5J === 'number' ? aktie.perf5J : 0;
            const yieldVal = typeof aktie.yield === 'number' ? aktie.yield : 0;

            const monatClass = perfMonat >= 0 ? 'positive' : 'negative';
            const jahrClass = perfJahr >= 0 ? 'positive' : 'negative';
            
            let dividendDisplay = "-";
            if (yieldVal > 0) {
                dividendDisplay = yieldVal === 0.01 ? "Ja" : `${yieldVal.toFixed(2)} %`;
            }

            // KGV
            const hatKGV = typeof aktie.kgv === 'number' && aktie.kgv > 0;
            const hatKGV5J = typeof aktie.kgv5J === 'number' && aktie.kgv5J > 0;
            let discountBadgeHTML = "";
            let diffHTML = "";
            
            const abweichung = berechneKgvAbweichung(aktie);
            if (abweichung !== null) {
                const diffKlasse = abweichung <= 0 ? 'positive' : 'negative';
                const vorzeichen = abweichung > 0 ? '+' : '';
                diffHTML = `<span class="kgv-diff-text ${diffKlasse}">(${vorzeichen}${abweichung.toFixed(1)}%)</span>`;
                if (abweichung < 0) {
                    discountBadgeHTML = `<span class="discount-badge">Günstig 🔥</span>`;
                }
            }
            const kgvDisplay = hatKGV ? aktie.kgv.toFixed(1) : '-';
            const kgv5JDisplay = hatKGV5J ? aktie.kgv5J.toFixed(1) : '-';

            // KCV (Neu abgesichert)
            const hatKCV = typeof aktie.kcv === 'number' && aktie.kcv > 0;
            const hatKCV5J = typeof aktie.kcv5J === 'number' && aktie.kcv5J > 0;
            const kcvDisplay = hatKCV ? aktie.kcv.toFixed(1) : '-';
            const kcv5JDisplay = hatKCV5J ? aktie.kcv5J.toFixed(1) : '-';

            const fallbackSrc = "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=100&auto=format&fit=crop&q=60";
            const logoUrl = aktie.logoUrl || fallbackSrc;

            const item = document.createElement('div');
            item.className = 'stock-item';
            item.innerHTML = `
                <div class="stock-summary" onclick="toggleDetails(this.parentNode)">
                    <div class="stock-profile">
                        <img src="${logoUrl}" class="stock-logo" onerror="this.onerror=null; this.src='${fallbackSrc}';">
                        <div class="stock-info">
                            <div class="name">${aktie.name || 'Unbekannt'}</div>
                            <div class="tags-container">${tagsHTML}</div>
                        </div>
                    </div>
                    <div class="stock-value">${aktie.kurs || '-'}</div>
                    <div class="stock-value perf ${monatClass}">${perfMonat >= 0 ? '+' : ''}${perfMonat.toFixed(2)}%</div>
                    <div class="stock-value perf ${jahrClass}">${perfJahr >= 0 ? '+' : ''}${perfJahr.toFixed(2)}%</div>
                    <div class="stock-value hide-tablet">${dividendDisplay}</div>
                    <div class="stock-value hide-tablet" style="white-space: nowrap;">${kgvDisplay}${diffHTML}${discountBadgeHTML}</div>
                    <div class="stock-value hide-tablet" style="color: var(--text-muted); font-size: 0.95rem;">${kcvDisplay} <span style="font-size: 0.8rem; color: #64748b;">(${kcv5JDisplay})</span></div>
                </div>

                <div class="mobile-row-layout" onclick="toggleDetails(this.parentNode)">
                    <div class="mobile-left">
                        <img src="${logoUrl}" class="stock-logo" onerror="this.onerror=null; this.src='${fallbackSrc}';">
                        <div class="stock-info">
                            <div class="name">${aktie.name || 'Unbekannt'}</div>
                            <div class="tags-container">${tagsHTML}</div>
                        </div>
                    </div>
                    <div class="mobile-right">
                        <div class="mob-kurs">${aktie.kurs || '-'}</div>
                        <div class="mob-perf perf ${monatClass}">${perfMonat >= 0 ? '+' : ''}${perfMonat.toFixed(2)}%</div>
                    </div>
                </div>

                <div class="stock-details">
                    <div class="details-container">
                        <div class="details-grid">
                            <div class="detail-card highlight">
                                <label>Dividenden-Monate</label>
                                <span>${aktie.monate || '-'}</span>
                            </div>
                            <div class="detail-card">
                                <label>Intervall</label>
                                <span>${aktie.frequenz || '-'}</span>
                            </div>
                            <div class="detail-card">
                                <label>Ex-Datum</label>
                                <span>${aktie.exDate || '-'}</span>
                            </div>
                            <div class="detail-card">
                                <label>Aktuelles KGV</label>
                                <span style="color: var(--text-main);">${kgvDisplay} ${diffHTML}</span>
                            </div>
                            <div class="detail-card">
                                <label>5Y Ø KGV</label>
                                <span style="color: var(--accent);">${kgv5JDisplay}</span>
                            </div>
                            <div class="detail-card">
                                <label>Aktuelles KCV</label>
                                <span style="color: var(--text-main);">${kcvDisplay}</span>
                            </div>
                            <div class="detail-card">
                                <label>5Y Ø KCV</label>
                                <span style="color: var(--accent);">${kcv5JDisplay}</span>
                            </div>
                            <div class="detail-card">
                                <label>5J Perf.</label>
                                <span class="perf ${perf5J >= 0 ? 'positive' : 'negative'}">
                                    ${perf5J >= 0 ? '+' : ''}${perf5J.toFixed(1)}%
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function toggleDetails(element) {
        const isOpen = element.classList.contains('open');
        document.querySelectorAll('.stock-item').forEach(i => i.classList.remove('open'));
        if (!isOpen) element.classList.add('open');
    }

    function filterAktien() {
        const suchBegriff = document.getElementById('search').value.toLowerCase();
        const sortWert = document.getElementById('sortPerformance').value;

        if (!Array.isArray(alleAktien)) return;

        let ergebnis = alleAktien.filter(aktie => {
            const name = aktie.name ? aktie.name.toLowerCase() : '';
            const tags = Array.isArray(aktie.tags) ? aktie.tags : [];
            return name.includes(suchBegriff) || tags.some(t => t.toLowerCase().includes(suchBegriff));
        });

        if (sortWert === 'perfMonat') {
            ergebnis.sort((a, b) => (b.perfMonat || 0) - (a.perfMonat || 0));
        } else if (sortWert === 'perfJahr') {
            ergebnis.sort((a, b) => (b.perfJahr || 0) - (a.perfJahr || 0));
        } else if (sortWert === 'yield') {
            ergebnis.sort((a, b) => (b.yield || 0) - (a.yield || 0));
        } else if (sortWert === 'kgvAsc') {
            ergebnis.sort((a, b) => {
                const valA = a.kgv && a.kgv > 0 ? a.kgv : Infinity;
                const valB = b.kgv && b.kgv > 0 ? b.kgv : Infinity;
                return valA - valB;
            });
        } else if (sortWert === 'kgvDesc') {
            ergebnis.sort((a, b) => {
                const valA = a.kgv && a.kgv > 0 ? a.kgv : -Infinity;
                const valB = b.kgv && b.kgv > 0 ? b.kgv : -Infinity;
                return valB - valA;
            });
        } else if (sortWert === 'kgvDiffAsc') {
            ergebnis.sort((a, b) => {
                const abwA = berechneKgvAbweichung(a);
                const abwB = berechneKgvAbweichung(b);
                const valA = abwA !== null ? abwA : Infinity;
                const valB = abwB !== null ? abwB : Infinity;
                return valA - valB;
            });
        }

        renderAktien(ergebnis);
    }

    window.onload = datenLaden;
</script>
</body>
</html>
