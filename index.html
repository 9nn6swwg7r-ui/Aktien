<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Aktien Dashboard & Watchlist</title>
    <style>
        body {
            background-color: #0d0d11;
            color: #f1f1f6;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0;
            padding: 30px 15px;
        }
        
        h1, h2 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 3px;
            color: #ffffff;
            text-transform: uppercase;
        }

        h1 { margin-bottom: 35px; font-size: 1.8em; }
        h2 { font-size: 1.4em; text-align: left; margin: 0; }

        /* Watchlist Header mit animiertem Dropdown-Pfeil */
        .watchlist-section {
            max-width: 900px;
            margin: 40px auto 10px auto;
            background: #161622;
            border: 1px solid #2d2d3f;
            border-radius: 14px;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }

        .watchlist-section:hover {
            background: #1d1d2b;
        }

        .arrow-icon {
            font-size: 1.3em;
            transition: transform 0.3s;
            color: #00e5ff;
        }

        /* Versteckt das Grid standardmäßig */
        .watchlist-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Wenn aktiv, klappt es geschmeidig auf */
        .watchlist-container.open {
            max-height: 15000px; /* Groß genug für alle Karten */
            margin-top: 20px;
        }

        .watchlist-container.open + .watchlist-section .arrow-icon {
            transform: rotate(180deg);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        @media (min-width: 600px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card {
            background: linear-gradient(145deg, #16161f, #12121a);
            border: 1px solid #232330;
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            border-bottom: 1px solid #232330;
            padding-bottom: 12px;
        }

        .logo-container {
            width: 45px;
            height: 45px;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .stock-identity {
            text-align: right;
            max-width: 70%;
        }

        .stock-name {
            font-size: 1.15em;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tags {
            font-size: 0.72em;
            color: #8a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95em;
            color: #a0a0b0;
        }

        .metric-value {
            font-weight: 600;
            color: #ffffff;
        }

        .positive { color: #39ff14; text-shadow: 0 0 8px rgba(57, 255, 20, 0.2); }
        .negative { color: #ff3131; text-shadow: 0 0 8px rgba(255, 49, 49, 0.2); }
        .kgv-warning { color: #ff3131 !important; font-weight: 700; }
        .kgv-good { color: #00e5ff; }
        .kurs-highlight { font-size: 1.1em; color: #ffffff; font-weight: 700; }

        .loading {
            text-align: center;
            color: #8a8a9e;
            grid-column: 1 / -1;
            padding: 40px;
        }
    </style>
</head>
<body>

    <h1>Global Equity Screener</h1>
    <div class="dashboard" id="main-dashboard">
        <div class="loading">Analysiere Hauptmärkte...</div>
    </div>

    <div class="watchlist-section" onclick="toggleWatchlist()">
        <h2>Watchlist</h2>
        <div class="arrow-icon" id="arrow">▼</div>
    </div>
    
    <div class="watchlist-container" id="watchlist-wrapper">
        <div class="dashboard" id="watchlist-dashboard">
            </div>
    </div>

    <script>
        function toggleWatchlist() {
            const wrapper = document.getElementById('watchlist-wrapper');
            const arrow = document.getElementById('arrow');
            if (wrapper.classList.contains('open')) {
                wrapper.classList.remove('open');
                arrow.innerHTML = '▼';
            } else {
                wrapper.classList.add('open');
                arrow.innerHTML = '▲';
            }
        }

        function fmtPerf(val) {
            if (val === undefined || val === null || isNaN(val)) return '<span class="metric-value">N/A</span>';
            if (val > 0) return `<span class="metric-value positive">+${val.toFixed(1).replace('.', ',')}%</span>`;
            if (val < 0) return `<span class="metric-value negative">${val.toFixed(1).replace('.', ',')}%</span>`;
            return `<span class="metric-value">0,0%</span>`;
        }

        function erstelleKarte(item) {
            const card = document.createElement('div');
            card.className = 'card';
            
            let kgvClass = "metric-value kgv-good";
            let kgvText = "N/A";
            if (item.kgv && item.kgv > 0) {
                kgvText = item.kgv.toFixed(1).replace('.', ',');
                if (item.kgv > 35) kgvClass = "metric-value kgv-warning";
            }

            const divText = (item.yield && item.yield > 0) ? `${item.yield.toFixed(2).replace('.', ',')}%` : '0,00%';
            const stichworte = item.tags ? item.tags.join(' • ') : 'Global Business';
            
            // NEUER LOGO-DIENST: Wechsel auf die stabilere Hunter.io API
            const domain = item.logoUrl.replace('https://logo.clearbit.com/', '');
            const stabileLogoUrl = `https://logos.hunter.io/${domain}`;
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="logo-container">
                        <img src="${stabileLogoUrl}" alt="" class="logo" onerror="this.src='https://placehold.co/50x50/16161f/ffffff?text=${encodeURIComponent(item.name[0])}'">
                    </div>
                    <div class="stock-identity">
                        <div class="stock-name">${item.name}</div>
                        <div class="tags" title="${stichworte}">${stichworte}</div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="metric">
                        <span>Kurs (EUR):</span>
                        <span class="metric-value kurs-highlight">${item.kurs}</span>
                    </div>
                    <div class="metric">
                        <span>Performance 1M:</span>
                        ${fmtPerf(item.perfMonat)}
                    </div>
                    <div class="metric">
                        <span>Performance 1J:</span>
                        ${fmtPerf(item.perfJahr)}
                    </div>
                    <div class="metric">
                        <span>Performance 5J:</span>
                        ${fmtPerf(item.perf5J)}
                    </div>
                    <div class="metric">
                        <span>Div.-Rendite:</span>
                        <span class="metric-value" style="color: #e0e0e0;">${divText}</span>
                    </div>
                    <div class="metric" style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #232330;">
                        <span>KGV:</span>
                        <span class="${kgvClass}">${kgvText}</span>
                    </div>
                </div>
            `;
            return card;
        }

        fetch('daten.json')
            .then(res => res.json())
            .then(data => {
                const mainDashboard = document.getElementById('main-dashboard');
                const watchlistDashboard = document.getElementById('watchlist-dashboard');
                
                mainDashboard.innerHTML = '';
                watchlistDashboard.innerHTML = '';

                // Beide Listen separat sortieren (Niedrigstes KGV nach oben)
                data.sort((a, b) => {
                    const kA = (a.kgv && a.kgv > 0) ? a.kgv : Infinity;
                    const kB = (b.kgv && b.kgv > 0) ? b.kgv : Infinity;
                    return kA - kB;
                });

                data.forEach(item => {
                    const karte = erstelleKarte(item);
                    // Wenn das Attribut "watchlist" true ist, kommt es in das Dropdown, sonst ins Haupt-Dashboard
                    if (item.watchlist === true) {
                        watchlistDashboard.appendChild(karte);
                    } else {
                        mainDashboard.appendChild(karte);
                    }
                });
            })
            .catch(err => {
                document.getElementById('main-dashboard').innerHTML = '<div class="loading" style="color: #ff3131;">Fehler beim Laden. Bitte starte den Workflow einmal manuell.</div>';
            });
    </script>
</body>
</html>
