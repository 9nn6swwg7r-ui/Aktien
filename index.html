<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktien Terminal Pro - V4.5 (Universal-Parser)</title>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: #111827;
            --bg-card-hover: #1f2937;
            --bg-header: #151f32;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #38bdf8;
            --positive: #10b981;
            --negative: #ef4444;
            --border: #374151;
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1500px; margin: 0 auto; }
        header { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .header-title-row { display: flex; align-items: center; gap: 15px; }
        h1 { font-size: 1.8rem; font-weight: 800; color: #ffffff; letter-spacing: -0.5px; }
        .version-badge { background: var(--accent); color: var(--bg-main); font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }

        /* Filter-Leiste */
        .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-input, .select-input { background-color: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 12px 16px; border-radius: var(--radius); outline: none; font-size: 0.9rem; }
        .search-input { flex: 1; min-width: 250px; }
        .select-input { flex: 1; min-width: 160px; cursor: pointer; }
        .search-input:focus, .select-input:focus { border-color: var(--accent); }

        /* Desktop Tabellen-Layout */
        .table-grid { display: grid; grid-template-columns: 2.5fr 5.5fr; align-items: center; padding: 14px 20px; }
        .table-header { background-color: var(--bg-header); font-weight: 700; color: var(--text-muted); border-radius: var(--radius) var(--radius) 0 0; border: 1px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .desktop-headers { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1.6fr 1.6fr; width: 100%; }
        .desktop-headers span { text-align: center; }
        .desktop-headers .txt-right { text-align: right; }

        .stock-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
        .stock-row { background-color: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: background-color 0.15s; }
        .stock-row:hover { background-color: var(--bg-card-hover); border-color: #4b5563; }
        .stock-summary { cursor: pointer; user-select: none; }

        .main-info-block { display: flex; align-items: center; }
        .mobile-price-display { display: none; }
        .metrics-block { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1.6fr 1.6fr; align-items: center; width: 100%; }
        .metric-item { display: flex; flex-direction: column; }
        .metric-item .m-label { display: none; }

        /* Desktop Ausrichtungen */
        .c-kurs { text-align: right; justify-content: flex-end; font-weight: 600; color: #ffffff; }
        .c-tag, .c-monat, .c-jahr, .c-div { text-align: center; justify-content: center; }
        .c-kgv, .c-kcv { text-align: right; justify-content: flex-end; }

        /* Profile & Tags */
        .stock-profile { display: flex; align-items: center; gap: 12px; }
        .stock-logo { width: 35px; height: 35px; border-radius: 6px; background-color: #ffffff; object-fit: contain; padding: 2px; border: 1px solid var(--border); flex-shrink: 0; }
        .stock-info { display: flex; flex-direction: column; overflow: hidden; }
        .stock-name { font-weight: 700; font-size: 0.95rem; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stock-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .tag { background: #1f2937; color: #9ca3af; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; }

        /* Badges */
        .perf-badge { padding: 5px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; min-width: 72px; text-align: center; display: inline-block; }
        .perf-badge.positive { color: var(--positive); background-color: rgba(16, 185, 129, 0.12); }
        .perf-badge.negative { color: var(--negative); background-color: rgba(239, 68, 68, 0.12); }
        .val-main { font-size: 0.95rem; color: #ffffff; }
        .val-sub { font-size: 0.75rem; font-weight: 700; margin-left: 5px; }
        .val-sub.positive { color: var(--positive); }
        .val-sub.negative { color: var(--negative); }

        .discount-container { display: flex; flex-direction: column; align-items: flex-end; }
        .discount-badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; background: #065f46; color: #34d399; padding: 1px 5px; border-radius: 4px; margin-top: 3px; border: 1px solid rgba(52, 211, 153, 0.2); }

        /* Details */
        .stock-details { display: none; padding: 20px; background-color: #0b111e; border-top: 1px solid var(--border); grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .detail-card { background: rgba(17, 24, 39, 0.8); padding: 12px 15px; border-radius: 6px; border: 1px solid var(--border); }
        .detail-card label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
        .detail-card span { font-size: 1.05rem; font-weight: 700; color: #ffffff; }

        /* Debug & Info Boxen */
        .debug-box { background: #1e1b4b; border: 1px solid #4338ca; padding: 15px; border-radius: var(--radius); margin-bottom: 15px; font-size: 0.85rem; color: #e0e7ff; }

        /* 📱 MOBILGERÄTE OPTIMIERUNG */
        @media (max-width: 900px) {
            .table-header { display: none !important; }
            .responsive-row-container { display: flex !important; flex-direction: column !important; align-items: stretch !important; padding: 16px !important; gap: 14px !important; }
            .main-info-block { display: flex !important; justify-content: space-between !important; align-items: center !important; width: 100% !important; }
            .mobile-price-display { display: block !important; font-size: 1.1rem !important; font-weight: 800 Imporant; color: #ffffff !important; background: rgba(255,255,255,0.05) !important; padding: 5px 12px !important; border-radius: 6px !important; border: 1px solid var(--border) !important; }
            .metrics-block { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 12px !important; background: rgba(13, 20, 35, 0.6) !important; padding: 12px !important; border-radius: 6px !important; border: 1px solid rgba(255,255,255,0.04) !important; width: 100% !important; }
            .metric-item { display: flex !important; flex-direction: column !important; align-items: center !important; text-align: center !important; justify-content: center !important; }
            .metric-item .m-label { display: block !important; font-size: 0.65rem !important; color: var(--text-muted) !important; text-transform: uppercase !important; font-weight: 700 !important; margin-bottom: 4px !important; }
            .c-kurs { display: none !important; }
            .c-tag, .c-monat, .c-jahr, .c-div, .c-kgv, .c-kcv { text-align: center !important; justify-content: center !important; }
            .discount-container { align-items: center !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title-row">
            <h1>Aktien Terminal Pro</h1>
            <span class="version-badge">V4.5 Live</span>
        </div>
        <div id="debugStatus" style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Starte Daten-Scan...</div>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" class="search-input" placeholder="Name, Ticker oder Tag suchen..." oninput="filterUndSortiere()">
        <select id="tagFilter" class="select-input" onchange="filterUndSortiere()">
            <option value="">Alle Branchen</option>
        </select>
        <select id="watchlistFilter" class="select-input" onchange="filterUndSortiere()">
            <option value="">Alle Listen (Gesamt)</option>
            <option value="portfolio">Portfolio (Depot)</option>
            <option value="watchlist">Watchlist</option>
        </select>
        <select id="sortFilter" class="select-input" onchange="waehleSortierungDropdown(this.value)">
            <option value="">Sortieren nach...</option>
            <option value="kgv_asc">KGV (Niedrig zuerst)</option>
            <option value="kgv_desc">KGV (Hoch zuerst)</option>
            <option value="kcv_asc">KCV (Niedrig zuerst)</option>
            <option value="kcv_desc">KCV (Hoch zuerst)</option>
        </select>
    </div>

    <div id="infoBoxContainer"></div>

    <!-- Desktop Kopfzeile -->
    <div class="table-grid table-header">
        <span style="text-align: left;">Unternehmen / Ticker</span>
        <div class="desktop-headers">
            <span class="txt-right">Kurs</span>
            <span>Heute</span>
            <span>1 Mon.</span>
            <span>1 Jahr</span>
            <span>Div.</span>
            <span class="txt-right">KGV</span>
            <span class="txt-right">KCV</span>
        </div>
    </div>

    <div id="stockList" class="stock-list">
        <p style="padding: 30px; text-align: center; color: var(--text-muted);">Suche nach daten.json...</p>
    </div>
</div>

<script>
    let alleAktienRaw = [];
    let alleAktien = [];
    let aktuelleSortierung = { spalte: null, richtung: 'asc' };

    function parseToNumber(val) {
        if (val === undefined || val === null || val === "N/A" || val === "-" || val === "None" || val === "") return null;
        if (typeof val === 'number') return val;
        let sauber = val.toString().replace(/[^0-9.,-]/g, '').replace(',', '.');
        let n = parseFloat(sauber);
        return isNaN(n) ? null : n;
    }

    // FLEXIBLER SMART-DETEKTOR FÜR DEINE SPALTENNAMEN
    function normalisiereObjekt(raw) {
        const getVal = (keys) => {
            for (let k of keys) {
                if (raw[k] !== undefined) return raw[k];
                if (raw[k.toLowerCase()] !== undefined) return raw[k.toLowerCase()];
                if (raw[k.toUpperCase()] !== undefined) return raw[k.toUpperCase()];
            }
            return null;
        };

        let tagsRaw = getVal(['tags', 'sector', 'industry', 'branche', 'tags_list']);
        let tagsArr = [];
        if (Array.isArray(tagsRaw)) {
            tagsArr = tagsRaw.map(String);
        } else if (typeof tagsRaw === 'string' && tagsRaw.trim() !== '') {
            tagsArr = tagsRaw.split(',').map(t => t.trim());
        }

        // Automatische Erkennung ob Watchlist oder Depot
        let wlValue = getVal(['watchlist', 'isWatchlist', 'liste', 'list', 'status']);
        let istWatchlist = false;
        if (wlValue === true || String(wlValue).toLowerCase() === 'true' || String(wlValue).toLowerCase() === 'watchlist') {
            istWatchlist = true;
        }

        return {
            name: getVal(['name', 'companyName', 'title', 'unternehmen']) || getVal(['ticker', 'symbol', 'aktie']) || 'Unbekannt',
            ticker: getVal(['ticker', 'symbol', 'aktie', 'kürzel']) || '???',
            logoUrl: getVal(['logoUrl', 'logo', 'image', 'icon']),
            kurs: getVal(['kurs', 'price', 'currentPrice', 'close', 'letzter_kurs']) !== null ? String(getVal(['kurs', 'price', 'currentPrice', 'close', 'letzter_kurs'])) : '-',
            perfTag: parseToNumber(getVal(['perfTag', 'changePercent', 'changesPercentage', 'dailyChange', 'change', 'perf_tag', 'heute'])),
            perfMonat: parseToNumber(getVal(['perfMonat', 'monthChange', '1mon', 'perf_monat', '1m'])),
            perfJahr: parseToNumber(getVal(['perfJahr', 'yearChange', '1jahr', 'perf_jahr', '1j'])),
            perf5J: parseToNumber(getVal(['perf5J', '5yChange', '5jahr', 'perf_5j', '5j'])),
            dividende: parseToNumber(getVal(['dividende', 'dividend', 'dividendYield', 'yield', 'div'])),
            kgv: parseToNumber(getVal(['kgv', 'pe', 'peRatio', 'p_e'])),
            kgv5J: parseToNumber(getVal(['kgv5J', 'pe5J', 'pe5y', 'kgv5Jahre', 'pe_ratio_5y'])),
            kcv: parseToNumber(getVal(['kcv', 'pc', 'priceToCashFlow', 'p_c'])),
            kcv5J: parseToNumber(getVal(['kcv5J', 'pc5J', 'pc5y', 'kcv5Jahre', 'p_cf_5y'])),
            monate: getVal(['monate', 'months', 'dividendMonths', 'intervall']),
            frequenz: getVal(['frequenz', 'frequency', 'turnus']),
            exDate: getVal(['exDate', 'ex_date', 'exdatum']),
            watchlist: istWatchlist,
            tags: tagsArr
        };
    }

    async function ladeDaten() {
        const container = document.getElementById('stockList');
        const status = document.getElementById('debugStatus');
        try {
            status.textContent = "Lade daten.json von Server...";
            const response = await fetch('daten.json');
            
            if (!response.ok) {
                throw new Error(`Datei daten.json nicht gefunden! (HTTP-Status: ${response.status})`);
            }
            
            const rawData = await response.json();
            let extrahiertesArray = [];

            // Universal-Check: Ist das JSON direkt eine Liste, oder ein verschachteltes Objekt?
            if (Array.isArray(rawData)) {
                extrahiertesArray = rawData;
                status.textContent = `Erfolgreich geladen: ${extrahiertesArray.length} Roheinträge gefunden (Direkt-Array).`;
            } else if (rawData && typeof rawData === 'object') {
                for (let key in rawData) {
                    if (Array.isArray(rawData[key])) {
                        extrahiertesArray = rawData[key];
                        status.textContent = `Erfolgreich geladen: ${extrahiertesArray.length} Roheinträge im Datenfeld "${key}" gefunden.`;
                        break;
                    }
                }
            }

            if (extrahiertesArray.length === 0) {
                // Struktur-Fehlerfall anzeigen um Fehlerursache sofort zu sehen
                document.getElementById('infoBoxContainer').innerHTML = `
                    <div class="debug-box">
                        <b>⚠️ Struktur-Fehlermeldung:</b><br>
                        Die daten.json wurde geladen, enthält aber kein lesbares Listenformat. <br>
                        Inhalt startet mit: <code style="color:#f43f5e">${JSON.stringify(rawData).substring(0, 150)}...</code>
                    </div>`;
                throw new Error("Kein gültiges Listen-Array in der JSON-Datei gefunden.");
            }

            // Normalisieren aller Datenfelder
            alleAktien = extrahiertesArray.map(item => normalisiereObjekt(item));
            
            extrahiereTags();
            filterUndSortiere();
        } catch (error) {
            console.error(error);
            status.textContent = "Fehler beim Laden.";
            container.innerHTML = `<p style="padding:30px; text-align:center; color:var(--negative);"><b>Fehler beim Laden von daten.json:</b><br>${error.message}</p>`;
        }
    }

    function extrahiereTags() {
        try {
            const tagSet = new Set();
            alleAktien.forEach(a => { if (a.tags) a.tags.forEach(t => { if(t) tagSet.add(String(t)); }); });
            const select = document.getElementById('tagFilter');
            if (select && select.options.length <= 1) {
                tagSet.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t; opt.textContent = t; select.appendChild(opt);
                });
            }
        } catch(e) { console.error(e); }
    }

    function waehleSortierungDropdown(value) {
        if (!value) {
            aktuelleSortierung.spalte = null;
            aktuelleSortierung.richtung = 'asc';
        } else {
            const parts = value.split('_');
            aktuelleSortierung.spalte = parts[0];
            aktuelleSortierung.richtung = parts[1];
        }
        filterUndSortiere();
    }

    function filterUndSortiere() {
        const container = document.getElementById('stockList');
        try {
            const sTerm = document.getElementById('searchInput').value.toLowerCase();
            const selTag = document.getElementById('tagFilter').value;
            const selWatch = document.getElementById('watchlistFilter').value;

            let daten = alleAktien.filter(a => {
                const nameStr = String(a.name || '').toLowerCase();
                const tickerStr = String(a.ticker || '').toLowerCase();
                const matchesSearch = nameStr.includes(sTerm) || tickerStr.includes(sTerm) || (a.tags || []).some(t => String(t || '').toLowerCase().includes(sTerm));
                const matchesTag = !selTag || (a.tags || []).map(String).includes(selTag);
                
                let matchesWatch = true;
                if (selWatch === 'watchlist') matchesWatch = (a.watchlist === true);
                if (selWatch === 'portfolio') matchesWatch = (a.watchlist === false);

                return matchesSearch && matchesTag && matchesWatch;
            });

            if (aktuelleSortierung.spalte) {
                daten.sort((a, b) => {
                    let valA = null, valB = null;
                    if (aktuelleSortierung.spalte === 'kgv') { valA = a.kgv; valB = b.kgv; }
                    else if (aktuelleSortierung.spalte === 'kcv') { valA = a.kcv; valB = b.kcv; }
                    if (valA === null) return 1;
                    if (valB === null) return -1;
                    return aktuelleSortierung.richtung === 'asc' ? valA - valB : valB - valA;
                });
            }

            renderAktien(daten);
        } catch (err) {
            container.innerHTML = `<div style="padding: 20px; color: var(--negative);">Filter-Fehler: ${err.message}</div>`;
        }
    }

    function renderAktien(daten) {
        const container = document.getElementById('stockList');
        container.innerHTML = '';

        if (daten.length === 0) {
            container.innerHTML = '<p style="padding:30px; text-align:center; color:var(--text-muted); font-size:0.95rem;">Keine passenden Aktien in dieser Liste gefunden.</p>';
            return;
        }

        daten.forEach(aktie => {
            try {
                const pTag = aktie.perfTag || 0;
                const pMonat = aktie.perfMonat || 0;
                const pJahr = aktie.perfJahr || 0;
                const p5J = aktie.perf5J || 0;

                let dividendDisplay = "-";
                if (aktie.dividende !== null) {
                    dividendDisplay = aktie.dividende < 0.2 ? `${(aktie.dividende * 100).toFixed(2)} %` : `${aktie.dividende.toFixed(2)} %`;
                }

                let kgvHTML = `<span class="val-main">-</span>`;
                if (aktie.kgv !== null) {
                    let diffHTML = ""; let discountHTML = "";
                    if (aktie.kgv5J !== null && aktie.kgv5J !== 0) {
                        const abw = ((aktie.kgv - aktie.kgv5J) / aktie.kgv5J) * 100;
                        diffHTML = `<span class="val-sub ${abw <= 0 ? 'positive' : 'negative'}">${abw > 0 ? '+' : ''}${abw.toFixed(0)}%</span>`;
                        if (abw < -10) discountHTML = `<span class="discount-badge">Rabatt 🏷️</span>`;
                    }
                    kgvHTML = `<div class="discount-container"><div><span class="val-main">${aktie.kgv.toFixed(1)}</span>${diffHTML}</div>${discountHTML}</div>`;
                }

                let kcvHTML = `<span class="val-main">-</span>`;
                if (aktie.kcv !== null) {
                    let diffHTML = ""; let discountHTML = "";
                    if (aktie.kcv5J !== null && aktie.kcv5J !== 0) {
                        const abw = ((aktie.kcv - aktie.kcv5J) / aktie.kcv5J) * 100;
                        diffHTML = `<span class="val-sub ${abw <= 0 ? 'positive' : 'negative'}">${abw > 0 ? '+' : ''}${abw.toFixed(0)}%</span>`;
                        if (abw < 0 && !discountHTML) discountHTML = `<span class="discount-badge">Günstig 💸</span>`;
                    }
                    kcvHTML = `<div class="discount-container"><div><span class="val-main">${aktie.kcv.toFixed(1)}</span>${diffHTML}</div>${discountHTML}</div>`;
                }

                const tagsHTML = (aktie.tags || []).map(t => `<span class="tag">${String(t)}</span>`).join('');
                const fallbackLogo = `https://via.placeholder.com/32?text=${aktie.ticker || '?'}`;

                const row = document.createElement('div');
                row.className = 'stock-row';
                row.innerHTML = `
                    <div class="responsive-row-container stock-summary" onclick="toggleDetails(this.parentNode)">
                        <div class="main-info-block">
                            <div class="stock-profile">
                                <img class="stock-logo" src="${aktie.logoUrl || fallbackLogo}" onerror="this.src='${fallbackLogo}';">
                                <div class="stock-info">
                                    <span class="stock-name">${aktie.name} <span style="color:var(--text-muted); font-size:0.75rem;">(${aktie.ticker})</span></span>
                                    <div class="stock-tags">${tagsHTML}</div>
                                </div>
                            </div>
                            <div class="mobile-price-display">${aktie.kurs}</div>
                        </div>
                        <div class="metrics-block">
                            <div class="metric-item c-kurs"><span class="m-label">Kurs</span><span class="val-main">${aktie.kurs}</span></div>
                            <div class="metric-item c-tag"><span class="m-label">Heute</span><span class="perf-badge ${pTag >= 0 ? 'positive' : 'negative'}">${pTag >= 0 ? '+' : ''}${pTag.toFixed(2)}%</span></div>
                            <div class="metric-item c-monat"><span class="m-label">1 Mon.</span><span class="perf-badge ${pMonat >= 0 ? 'positive' : 'negative'}">${pMonat >= 0 ? '+' : ''}${pMonat.toFixed(2)}%</span></div>
                            <div class="metric-item c-jahr"><span class="m-label">1 Jahr</span><span class="perf-badge ${pJahr >= 0 ? 'positive' : 'negative'}">${pJahr >= 0 ? '+' : ''}${pJahr.toFixed(2)}%</span></div>
                            <div class="metric-item c-div"><span class="m-label">Div.</span><span class="val-main" style="font-weight:600;">${dividendDisplay}</span></div>
                            <div class="metric-item c-kgv"><span class="m-label">KGV</span>${kgvHTML}</div>
                            <div class="metric-item c-kcv"><span class="m-label">KCV</span>${kcvHTML}</div>
                        </div>
                    </div>
                    <div class="stock-details">
                        <div class="detail-card"><label>📆 Ausschüttung</label><span>${aktie.monate || '-'}</span></div>
                        <div class="detail-card"><label>🔄 Frequenz</label><span>${aktie.frequenz || '-'}</span></div>
                        <div class="detail-card"><label>KGV Aktuell</label><span>${aktie.kgv !== null ? aktie.kgv.toFixed(1) : '-'}</span></div>
                        <div class="detail-card"><label>KGV 5J Ø</label><span style="color:var(--text-muted);">${aktie.kgv5J !== null ? aktie.kgv5J.toFixed(1) : '-'}</span></div>
                        <div class="detail-card"><label>KCV Aktuell</label><span>${aktie.kcv !== null ? aktie.kcv.toFixed(1) : '-'}</span></div>
                        <div class="detail-card"><label>KCV 5J Ø</label><span style="color:var(--text-muted);">${aktie.kcv5J !== null ? aktie.kcv5J.toFixed(1) : '-'}</span></div>
                        <div class="detail-card"><label>Ex-Date</label><span>${aktie.exDate || '-'}</span></div>
                        <div class="detail-card"><label>5J Performance</label><span class="${p5J >= 0 ? 'positive' : 'negative'}" style="color:${p5J >= 0 ? 'var(--positive)' : 'var(--negative)'}">${p5J >= 0 ? '+' : ''}${p5J.toFixed(1)}%</span></div>
                    </div>
                `;
                container.appendChild(row);
            } catch(rowErr) { console.error(rowErr); }
        });
    }

    function toggleDetails(rowElement) {
        const details = rowElement.querySelector('.stock-details');
        const isVisible = window.getComputedStyle(details).display === 'grid';
        document.querySelectorAll('.stock-details').forEach(el => el.style.display = 'none');
        details.style.display = isVisible ? 'none' : 'grid';
    }

    window.onload = ladeDaten;
</script>
</body>
</html>
