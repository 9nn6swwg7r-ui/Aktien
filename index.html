<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Dashboard</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #161b22; }
        th, td { padding: 12px; border: 1px solid #30363d; text-align: center; font-size: 14px; }
        th { background: #21262d; color: #58a6ff; }
        .error { color: #f85149; font-weight: bold; padding: 20px; border: 1px solid #f85149; }
    </style>
</head>
<body>

    <h2>Portfolio Dashboard</h2>
    <table id="portfolioTable">
        <thead>
            <tr>
                <th>Name</th><th>Kurs</th><th>1M%</th><th>1J%</th><th>Div%</th><th>KGV</th><th>KCV</th><th>Abw. 5J%</th>
            </tr>
        </thead>
        <tbody id="app">
            <tr><td colspan="8">Lade Daten...</td></tr>
        </tbody>
    </table>

    <script>
        fetch('daten.json')
            .then(response => {
                if (!response.ok) throw new Error("HTTP-Fehler: " + response.status);
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('app');
                tbody.innerHTML = ''; // Leeren
                
                data.forEach((a, index) => {
                    // Falls Daten fehlen, nutzen wir || 0 als Fallback
                    const row = `
                        <tr>
                            <td style="text-align:left">${a.name || "Unbekannt"}</td>
                            <td>${(a.price || 0).toFixed(2)}</td>
                            <td>${(a.perf1M || 0).toFixed(1)}%</td>
                            <td>${(a.perf1J || 0).toFixed(1)}%</td>
                            <td>${(a.divYield || 0).toFixed(1)}%</td>
                            <td>${(a.kgv || 0).toFixed(1)}</td>
                            <td>${(a.kcv || 0).toFixed(1)}</td>
                            <td>${(a.abweichung5J || 0).toFixed(1)}%</td>
                        </tr>`;
                    tbody.innerHTML += row;
                });
            })
            .catch(err => {
                document.getElementById('app').innerHTML = `<tr><td colspan="8" class="error">FEHLER: ${err.message}</td></tr>`;
                console.error(err);
            });
    </script>
</body>
</html>
