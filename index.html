<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Aktien Terminal v4.5</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
    </style>
</head>
<body>
    <h1>Aktien Terminal v4.5</h1>
    <table>
        <thead>
            <tr><th>Ticker</th><th>Kurs</th><th>Dividende</th></tr>
        </thead>
        <tbody id="aktien-body"></tbody>
    </table>

    <script>
        fetch('daten.json')
            .then(response => response.json())
            .then(data => {
                const body = document.getElementById('aktien-body');
                data.forEach(a => {
                    body.innerHTML += `<tr><td>${a.ticker}</td><td>${a.kurs}</td><td>${(a.dividende*100).toFixed(2)}%</td></tr>`;
                });
            });
    </script>
</body>
</html>
