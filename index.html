<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Dashboard</title>
    <style>
        body { 
            background: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            padding: 10px; 
            margin: 0;
        }
        h2 { font-size: 1.2em; color: #ffffff; margin-bottom: 10px; }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: #161b22; 
            font-size: 0.75em; 
        }
        th, td { 
            padding: 8px; 
            border: 1px solid #30363d; 
            text-align: center; 
        }
        th { 
            background: #21262d; 
            color: #58a6ff; 
            font-weight: bold;
        }
        .pos { color: #3fb950; } 
        .neg { color: #f85149; }
        tr:hover { background-color: #1c2128; }
    </style>
</head>
<body>

    <h2>Portfolio Dashboard (51 Werte)</h2>
    <table id="portfolioTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Kurs</th>
                <th>1M%</th>
                <th>1J%</th>
                <th>Div%</th>
                <th>KGV</th>
                <th>KCV</th>
                <th>Abw. 5J%</th>
            </tr>
        </thead>
        <tbody id="app">
            <tr><td colspan="8">Lade Daten...</td></tr>
        </tbody>
    </table>

    <script>
        fetch('daten.json')
            .then(response => {
                if (!response.ok) throw new Error("Fehler beim Laden der daten.json");
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('app');
                tbody.innerHTML = ''; // Vorherige Ladeanzeige entfernen
                
                data.forEach(a => {
                    const row = `
                        <tr>
                            <td style="text-align:left">${a.name}</td>
                            <td>${a.price.toFixed(2)}</td>
                            <td class="${a.perf1M >= 0 ? 'pos' : 'neg'}">${a.perf1M.toFixed(1)}%</td>
                            <td class="${a.perf1J >= 0 ? 'pos' : 'neg'}">${a.perf1J.toFixed(1)}%</td>
                            <td>${a.divYield.toFixed(1)}%</td>
                            <td>${a.kgv.toFixed(1)}</td>
                            <td>${a.kcv.toFixed(1)}</td>
                            <td class="${a.abweichung5J >= 0 ? 'pos' : 'neg'}">${a.abweichung5J.toFixed(1)}%</td>
                        </tr>`;
                    tbody.innerHTML += row;
                });
            })
            .catch(err => {
                document.getElementById('app').innerHTML = `<tr><td colspan="8" class="neg">Fehler: ${err.message}</td></tr>`;
            });
    </script>
</body>
</html>
