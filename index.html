<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Aktien Terminal Pro</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h1 { color: #ffffff; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { background: #2a2a2a; color: #ff9800; }
        .watchlist-true { background-color: #2e2a1a; color: #ffeb3b; }
        .logo { width: 24px; height: 24px; vertical-align: middle; margin-right: 8px; }
        .tag { font-size: 0.8em; background: #444; padding: 2px 6px; border-radius: 4px; margin-right: 4px; }
    </style>
</head>
<body>
    <h1>Aktien Terminal Pro V4.5</h1>
    <table id="aktienTable">
        <thead>
            <tr><th>Logo</th><th>Name</th><th>Ticker</th><th>Tags</th></tr>
        </thead>
        <tbody id="app"></tbody>
    </table>
    <script>
        fetch('daten.json')
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('app');
                data.forEach(a => {
                    const rowClass = a.watchlist ? 'watchlist-true' : '';
                    tbody.innerHTML += `
                        <tr class="${rowClass}">
                            <td><img src="${a.logoUrl}" class="logo" onerror="this.style.display='none'"></td>
                            <td>${a.name}</td>
                            <td>${a.symbol}</td>
                            <td>${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}</td>
                        </tr>`;
                });
            });
    </script>
</body>
</html>
