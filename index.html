<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Aktien Terminal Pro V4.5</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; text-align: center; font-size: 0.85em; }
        .val { font-weight: bold; font-size: 1.1em; }
        .pos { color: #3fb950; } .neg { color: #f85149; }
    </style>
</head>
<body>
    <h1>Aktien Terminal Pro <small>V4.5 LIVE</small></h1>
    <div id="container"></div>

    <script>
        fetch('daten.json').then(r => r.json()).then(data => {
            document.getElementById('container').innerHTML = data.map(a => `
                <div class="card">
                    <div><strong>${a.name}</strong> (${a.symbol})</div>
                    <div style="font-size: 1.4em; font-weight: bold; margin: 10px 0;">${a.price.toFixed(2)} ${a.currency}</div>
                    <div class="grid">
                        <div>HEUTE<br><div class="val ${a.changeHeute > 0 ? 'pos':'neg'}">${a.changeHeute.toFixed(2)}%</div></div>
                        <div>1 MON.<br><div class="val ${a.perfMonat > 0 ? 'pos':'neg'}">${a.perfMonat.toFixed(2)}%</div></div>
                        <div>DIV.<br><div class="val">${a.divYield.toFixed(1)}%</div></div>
                        <div>KGV<br><div class="val">${a.kgv.toFixed(1)}</div></div>
                        <div>KCV<br><div class="val">${a.kcv.toFixed(1)}</div></div>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
