<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Aktien Dashboard V5.0</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 10px; }
        table { width: 100%; border-collapse: collapse; background: #161b22; }
        th, td { padding: 8px; border: 1px solid #30363d; text-align: center; font-size: 0.75em; }
        th { background: #21262d; color: #58a6ff; }
        .pos { color: #3fb950; } .neg { color: #f85149; }
    </style>
</head>
<body>
    <h2>Portfolio Dashboard (51 Werte)</h2>
    <table>
        <thead>
            <tr><th>Name</th><th>Kurs</th><th>1M%</th><th>1J%</th><th>Div%</th><th>KGV</th><th>KCV</th><th>Abw. 5J%</th></tr>
        </thead>
        <tbody id="app"></tbody>
    </table>
    <script>
        fetch('daten.json').then(r => r.json()).then(data => {
            document.getElementById('app').innerHTML = data.map(a => `
                <tr>
                    <td style="text-align:left">${a.name}</td>
                    <td>${a.price.toFixed(2)}</td>
                    <td class="${a.perf1M>0?'pos':'neg'}">${a.perf1M.toFixed(1)}%</td>
                    <td class="${a.perf1J>0?'pos':'neg'}">${a.perf1J.toFixed(1)}%</td>
                    <td>${a.divYield.toFixed(1)}%</td>
                    <td>${a.kgv.toFixed(1)}</td>
                    <td>${a.kcv.toFixed(1)}</td>
                    <td class="${a.abweichung5J>0?'pos':'neg'}">${a.abweichung5J.toFixed(1)}%</td>
                </tr>
            `).join('');
        });
    </script>
</body>
</html>
