name: Automatische Aktualisierung Aktiendaten

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
    - name: Repository auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Daten von Yahoo Finance abrufen
      run: python hole_daten.py

    - name: Änderungen in GitHub speichern
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add daten.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Daten-Update: $(date +'%Y-%m-%d %H:%M')" && git push)
