name: Automatische Aktualisierung Aktiendaten

on:
  schedule:
    - cron: "0 * * * *"  # Startet jede volle Stunde
  workflow_dispatch:     # Erlaubt manuellen Start

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v3

    - name: Python einrichten
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install yfinance

    - name: Daten abrufen
      run: python hole_daten.py

    - name: Änderungen auf GitHub hochladen
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add daten.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Stündliches Aktiendaten-Update" && git push) || true
